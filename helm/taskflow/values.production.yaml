# Production : images figees, plus de replicas, plus de ressources
# IMPORTANT: les valeurs sensibles (postgres.password, jwt.secret) NE SONT PAS dans ce fichier.
# Elles sont passees a l'install via --set ou un fichier values-secrets.yaml non commite (.gitignore).
# Exemple : helm upgrade --install taskflow ./helm/taskflow \
#            --values values.yaml \
#            --values values.production.yaml \
#            --set postgres.password=$POSTGRES_PASSWORD \
#            --set jwt.secret=$JWT_SECRET

image:
  pullPolicy: Always

postgres:
  db: taskflow_prod
  storageSize: 10Gi

frontend:
  replicaCount: 2

userService:
  replicaCount: 3
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "400m"

taskService:
  replicaCount: 3
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "400m"

notificationService:
  replicaCount: 2

apiGateway:
  replicaCount: 3
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "400m"

redis:
  enabled: true
  fullnameOverride: redis
  architecture: standalone
  auth:
    enabled: false
  master:
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
