apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.notificationService.replicaCount }}
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: "{{ .Values.image.prefix }}-notification-service:{{ .Values.notificationService.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PORT
              value: "3003"
            - name: LOG_LEVEL
              value: "info"
            - name: REDIS_URL
              value: redis://redis-master:6379
            - name: OTEL_SERVICE_NAME
              value: notification-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: OTEL_COLLECTOR_URL
              value: {{ .Values.otel.endpoint | quote }}
          ports:
            - containerPort: 3003
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.notificationService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: notification-service
  ports:
    - port: 3003
      targetPort: 3003
