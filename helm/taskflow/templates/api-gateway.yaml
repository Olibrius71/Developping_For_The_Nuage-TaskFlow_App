apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: "{{ .Values.image.prefix }}-api-gateway:{{ .Values.apiGateway.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PORT
              value: "3000"
            - name: LOG_LEVEL
              value: "info"
            - name: JWT_SECRET
              value: {{ .Values.jwt.secret | quote }}
            - name: USER_SERVICE_URL
              value: http://user-service:3001
            - name: TASK_SERVICE_URL
              value: http://task-service:3002
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:3003
            - name: OTEL_SERVICE_NAME
              value: api-gateway
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: OTEL_COLLECTOR_URL
              value: {{ .Values.otel.endpoint | quote }}
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
